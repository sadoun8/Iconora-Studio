name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        python -m PyInstaller --onefile --windowed --name "Iconora Studio" --icon=assets/icons/app.ico --add-data "assets;assets" --clean --noconfirm main.py

    - name: List dist
      run: dir dist

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Iconora-Studio-windows-exe
        path: dist/
